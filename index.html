<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAPE Pro Max - Análise Crítica 9º Ano</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                        inter: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        glass: 'rgba(255, 255, 255, 0.05)',
                        glassBorder: 'rgba(255, 255, 255, 0.1)',
                        primary: '#6d28d9', // Violet 700
                        secondary: '#4f46e5', // Indigo 600
                        accent: '#10b981', // Emerald 500
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="style.css">
    
    <!-- External Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen relative overflow-x-hidden font-sans selection:bg-primary selection:text-white">
    <!-- Background Animated Gradients -->
    <div class="fixed inset-0 z-0 overflow-hidden pointer-events-none">
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-primary/20 blur-[120px] animate-pulse"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-secondary/20 blur-[120px] animate-pulse" style="animation-delay: 2s;"></div>
    </div>

    <!-- Main App Container -->
    <main id="app-container" class="relative z-10 container mx-auto px-4 py-8 min-h-screen flex flex-col items-center justify-center">
        
        <!-- LOGIN VIEW -->
        <div id="view-login" class="w-full max-w-md glass-panel p-8 rounded-2xl shadow-2xl animate__animated animate__fadeIn">
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-xl bg-gradient-to-br from-primary to-secondary mb-4 shadow-lg shadow-primary/30">
                    <i data-lucide="book-open-check" class="text-white w-8 h-8"></i>
                </div>
                <h1 class="text-3xl font-bold text-white mb-2">EduAção Crítica</h1>
                <p class="text-slate-400 text-sm">Plano de Unidade: Interpretação Textual</p>
            </div>

            <!-- Role Selector -->
            <div class="flex p-1 bg-slate-900/80 rounded-xl mb-6">
                <button id="tab-student" class="flex-1 py-2 text-sm font-medium rounded-lg bg-primary text-white shadow transition-all">Sou Aluno</button>
                <button id="tab-teacher" class="flex-1 py-2 text-sm font-medium rounded-lg text-slate-400 hover:text-white transition-all">Sou Professor</button>
            </div>

            <!-- Student Login -->
            <form id="form-student" class="space-y-6">
                <div>
                    <label for="student-name" class="block text-sm font-medium text-slate-300 mb-2">Qual o seu nome?</label>
                    <input type="text" id="student-name" required placeholder="Ex: João Silva" 
                           class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all">
                </div>
                <button type="submit" class="w-full bg-gradient-to-r from-primary to-secondary hover:from-primary/90 hover:to-secondary/90 text-white font-medium py-3 px-4 rounded-xl shadow-lg shadow-primary/25 transition-all transform hover:scale-[1.02] active:scale-95 flex items-center justify-center gap-2">
                    Acessar Missões <i data-lucide="arrow-right" class="w-4 h-4"></i>
                </button>
            </form>

            <!-- Teacher Login (Hidden by default) -->
            <form id="form-teacher" class="space-y-6 hidden">
                <div>
                    <label for="teacher-email" class="block text-sm font-medium text-slate-300 mb-2">E-mail do Professor</label>
                    <input type="email" id="teacher-email" required placeholder="prof@escola.com" 
                           class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-accent focus:border-transparent transition-all">
                </div>
                <div>
                    <label for="teacher-password" class="block text-sm font-medium text-slate-300 mb-2">Senha</label>
                    <input type="password" id="teacher-password" required placeholder="••••••••" 
                           class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-accent focus:border-transparent transition-all">
                </div>
                <button type="submit" class="w-full bg-gradient-to-r from-accent to-emerald-600 hover:from-accent/90 hover:to-emerald-600/90 text-white font-medium py-3 px-4 rounded-xl shadow-lg shadow-accent/25 transition-all transform hover:scale-[1.02] active:scale-95 flex items-center justify-center gap-2">
                    Entrar no Painel <i data-lucide="lock" class="w-4 h-4"></i>
                </button>
            </form>
        </div>

        <!-- APP SHELL (Hidden by default) -->
        <div id="view-app" class="hidden w-full max-w-6xl flex-col h-full animate__animated animate__fadeIn">
            <!-- Header -->
            <header class="glass-panel rounded-2xl p-4 mb-6 flex items-center justify-between shadow-lg sticky top-4 z-50">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-lg bg-gradient-to-br from-primary to-secondary flex items-center justify-center">
                        <i data-lucide="book-open" class="text-white w-5 h-5"></i>
                    </div>
                    <div>
                        <h2 class="text-xl font-bold text-white tracking-wide">EduAção</h2>
                        <p class="text-xs text-slate-400 font-inter">Letramento Crítico</p>
                    </div>
                </div>
                
                <div class="flex items-center gap-4">
                    <div id="user-info-badge" class="flex items-center gap-3 bg-slate-900/50 px-4 py-2 rounded-xl border border-glassBorder">
                        <div class="flex flex-col text-right hidden sm:flex">
                            <span id="current-user-name" class="text-sm font-medium text-white">Nome</span>
                            <span id="current-user-role" class="text-xs text-slate-400">Papel</span>
                        </div>
                        <div id="user-avatar" class="w-8 h-8 rounded-full bg-slate-700 flex items-center justify-center text-xs font-bold border-2 border-primary">
                            US
                        </div>
                    </div>
                    <button id="btn-logout" class="p-2 hover:bg-slate-800 rounded-lg text-slate-400 hover:text-red-400 transition-colors tooltip" title="Sair">
                        <i data-lucide="log-out" class="w-5 h-5"></i>
                    </button>
                </div>
            </header>

            <!-- Main Content Area -->
            <div class="grid grid-cols-1 lg:grid-cols-4 gap-6 items-start">
                
                <!-- Sidebar Navigation -->
                <aside class="glass-panel rounded-2xl p-4 lg:col-span-1 shadow-lg flex flex-col gap-2 sticky top-28" id="sidebar-nav">
                    <!-- Dynamic nav items injected here -->
                </aside>

                <!-- Dynamic Views Area -->
                <section class="lg:col-span-3 glass-panel rounded-2xl p-6 shadow-lg min-h-[600px] relative" id="main-content">
                    <!-- Content injected by JS -->
                </section>
                
            </div>
        </div>
    </main>

    <script src="app.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
